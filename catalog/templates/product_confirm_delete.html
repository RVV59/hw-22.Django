{% extends "base.html" %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-header">
                    <h2>Подтверждение удаления</h2>
                </div>
                <div class="card-body">
                    <p class="card-text">Вы уверены, что хотите удалить продукт <strong>"{{ object.name }}"</strong>?</p>
                    <p class="text-muted">Это действие нельзя будет отменить.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
