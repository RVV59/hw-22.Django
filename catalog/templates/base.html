<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Skystore{% endblock %}</title>

    <!-- Локальные файлы Bootstrap -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- CDN как fallback -->
    <script>
        if(typeof Bootstrap === 'undefined') {
            document.write('<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">');
            document.write('<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"><\/script>');
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'catalog:home' %}">SkyStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'catalog:home' %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'catalog:contacts' %}">Контакты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'blog:post_list' %}">Блог</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'catalog:product_create' %}">Добавить товар</a>
                        </li>
                        <form class="nav-item" action="{% url 'users:logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link" style="display: inline; border: none; padding: 0; background: none;">
                                Выйти
                            </button>
                        </form>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-primary" href="{% url 'users:register' %}">
                                <i class="bi bi-person-plus"></i> Регистрация
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-success" href="{% url 'users:login' %}">
                                <i class="bi bi-box-arrow-in-right"></i> Вход
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="container mt-5 text-center text-muted">
        <p>2025 SkyStore</p>
    </footer>

    <!-- Локальные JS-файлы -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
