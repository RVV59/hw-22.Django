{% extends "base.html" %}
{% block title %}{% if post %}Редактировать "{{ post.title }}"{% else %}Создать новую статью{% endif %}{% endblock %}

{% block content %}
<meta charset="UTF-8">
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <h4 class="my-0">{% if post %}Редактировать статью{% else %}Создать новую статью{% endif %}</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">{% if post %}Сохранить изменения{% else %}Опубликовать{% endif %}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
