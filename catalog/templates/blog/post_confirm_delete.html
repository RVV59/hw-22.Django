{% extends "base.html" %}
{% block title %}Удалить "{{ post.title }}"?{% endblock %}

{% block content %}
<meta charset="UTF-8">
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <h4 class="my-0">Подтвердите удаление</h4>
                </div>
                <div class="card-body text-center">
                    <p>Вы уверены, что хотите удалить статью "<strong>{{ post.title }}</strong>"?</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
                        <a href="{% url 'blog:post_detail' pk=post.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
