{% extends "base.html" %}
{% block title %}Блог | Skystore{% endblock %}

{% block content %}
<div class="container my-5">
    <h1>Статьи блога</h1>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text">{{ post.content|truncatechars:100 }}</p>
                    <a href="{% url 'blog:post_detail' post.id %}" class="btn btn-primary">Читать</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>Нет опубликованных статей.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
